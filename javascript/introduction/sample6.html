<script>
    var a = 100+null;
    document.write("<br>a : "+a);
    document.write("<br>typeof(a) : "+typeof a);

    var a = "100"+null;
    document.write("<br>a : "+a);
    document.write("<br>typeof(a) : "+typeof a);

    var a = 100+undefined;
    document.write("<br>a : "+a);
    document.write("<br>typeof(a) : "+typeof(a));
    
</script>
