<script>
    var a = 5 || "Hello";
    var b = -5 || "Hello";
    var c = 0 || "Hello";
    document.write("<br>a : "+a);    
    document.write("<br>b : "+b);    
    document.write("<br>c : "+c);    


    var a = 5 && "Hello";
    var b = -5 && "Hello";
    var c = 0 && "Hello";
    document.write("<br><br>a : "+a);    
    document.write("<br>b : "+b);    
    document.write("<br>c : "+c);    

    var a = 5 ?? "Hello";
    var b = -5 ?? "Hello";
    var c = 0 ?? "Hello";
    var d = null ?? "Hello";
    var e = undefined ?? "Hello";
    var f = false ?? "Hello";
    var g = true ?? "Hello";
    
    document.write("<br><br>a : "+a);    
    document.write("<br>b : "+b);    
    document.write("<br>c : "+c);    
    document.write("<br>d : "+d);    
    document.write("<br>e : "+e);    
    document.write("<br>f : "+f);    
    document.write("<br>g : "+g);    

</script>
